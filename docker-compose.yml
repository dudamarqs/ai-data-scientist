# Sobe o sistema inteiro com um comando: docker compose up
#
# Postgres e Redis ja ficam prontos para a evolucao natural do projeto:
#   - Postgres: metadados dos datasets (hoje estao em memoria)
#   - Redis:    cache de respostas + fila para o Celery (treinos assincronos)
services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ads:ads@postgres:5432/ads
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ads
      POSTGRES_PASSWORD: ads
      POSTGRES_DB: ads
    volumes:
      - dados_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ads"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

volumes:
  dados_postgres:
