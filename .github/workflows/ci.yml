# Integracao Continua: a cada push/PR, o GitHub roda a suite de testes.
# Se algum teste quebrar, o PR fica marcado como vermelho e nao deve ser mergeado.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  testes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar testes
        run: pytest -q
